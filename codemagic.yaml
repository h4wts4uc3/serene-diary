workflows:
  flet-android-build:
    name: Compilar Diario Serene Android
    max_build_duration: 30
    instance_type: linux_x2
    triggering:
      events:
        - push
    scripts:
      - name: Instalar Flet y Dependencias
        script: |
          pip3 install --break-system-packages -r requirements.txt

      - name: Inspeccionar estructura del proyecto
        script: |
          echo "=== Directorio actual ==="
          pwd
          echo "=== Contenido de la raiz del repo ==="
          ls -la

      - name: Compilar APK Android
        script: |
          flet build apk -vv

      - name: Inspeccionar salida del build
        script: |
          echo "=== Contenido de build/ ==="
          find build -maxdepth 4 -print
    artifacts:
      - build/apk/*.apk
